services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: dmc
      POSTGRES_PASSWORD: dmc
      POSTGRES_DB: dmc
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  api:
    build:
      context: ./services/api
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql://dmc:dmc@postgres:5432/dmc
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: http://localhost:3000
      ENABLE_LIVE_TRADING: "false"
      ENABLE_CTRADER_DEMO: "false"
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
    volumes:
      - ./services/api:/app

  web:
    build:
      context: ./apps/web
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app
      - /app/node_modules

volumes:
  postgres_data:
